name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # orbital/__init__ pulls visualization (plotly) and teacher (ipywidgets),
          # so the runtime deps must be present for test collection to import the package.
          pip install numpy plotly ipywidgets pytest

      - name: Run test suite
        run: python -m pytest tests/ -v

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff (syntax + common errors)
        run: |
          pip install ruff
          ruff check src/orbital tests --select E9,F63,F7,F82,F401

      - name: Mypy (type drift report)
        run: |
          pip install mypy numpy
          mypy src/orbital --ignore-missing-imports || true
